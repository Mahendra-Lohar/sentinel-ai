version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: sentinel_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: sentinel_ai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sentinel_ai"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - sentinel_net

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: sentinel_server
    environment:
      - NODE_ENV=production
      - PORT=8080
      - DATABASE_URL=postgres://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/sentinel_ai
      - JWT_SECRET=${JWT_SECRET:-super_secret_key_for_development}
      - CLIENT_URL=http://localhost:3000
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sentinel_net

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: sentinel_client
    ports:
      - "3000:80"
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - sentinel_net

volumes:
  pgdata:

networks:
  sentinel_net:
    driver: bridge
